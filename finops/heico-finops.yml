notes: HEICO is a hardware / aerospace component conglomerate, not a SaaS / API vendor. There is no
  invoice surface for API consumption to track in FinOps; spend with HEICO is purchase-order-based against
  components and parts. Meters here are stubs documenting that shape.
description: 'FOCUS-aligned FinOps stub for HEICO. HEICO does not bill for API access; spend is component
  purchase-order based.'
sources:
  - https://www.heico.com/
billingModel:
  pricingCategory: Purchase Order (Goods)
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: HEICO Corporation
  ServiceCategory: Aerospace / Defense
  ProviderName: HEICO Corporation
  PublisherName: HEICO Corporation
  InvoiceIssuerName: HEICO Corporation (operating subsidiary)
  PricingCategory: Purchase
  PricingUnit: part
  BillingCurrency: USD
  ChargeCategory: Purchase
principles:
  - name: Visibility
    description: Track spend through procurement / ERP systems against HEICO PO numbers and component part
      numbers. There is no public usage API to call.
  - name: Allocation
    description: Allocate component spend to fleet, aircraft tail, or program through ERP cost-center tags.
  - name: Optimization
    description: Levers are procurement-side - alternative-source qualification, overhaul-versus-replace
      decisions, and volume agreements.
  - name: Accountability
    description: Procurement / supply-chain owns the relationship and PO lifecycle; engineering owns
      part-substitution decisions.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Allocation
      - Reporting and Analytics
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
  - name: Optimize Usage and Cost
    capabilities:
      - Rate Optimization
      - Workload Optimization
  - name: Manage the FinOps Practice
    capabilities:
      - Invoicing and Chargeback
      - Intersecting Disciplines
meters:
  - name: component_purchases
    description: Component / part purchase-order line items
    unit: part
    aggregation: sum
    dimensions:
      - subsidiary
      - part_number
      - aircraft_program
apis:
  - name: HEICO Corporation API
    baseURL: https://api.heico.com
    tags:
      - Aerospace
      - Aviation
      - Defense
    serviceName: HEICO Corporation API
    serviceCategory: Aerospace / Defense
unitEconomics:
  - name: Cost per Component
    metric: po_total / parts_received
    target: per procurement agreement
