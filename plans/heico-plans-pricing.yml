notes: HEICO Corporation is an aerospace and electronics conglomerate (Flight Support Group, Electronic
  Technologies Group). It does not operate a public developer portal or expose API products with public
  pricing. Customer-facing systems (component search, customer login) are gated by trade-customer accounts.
  No public per-tier API pricing or rate-limit data exists to import. This artifact is intentionally minimal
  and unreconciled.
sources:
  - https://www.heico.com/
description: HEICO does not publish public API pricing. Any system-to-system integrations are governed by
  trade-customer agreements with HEICO operating subsidiaries.
plans:
  - id: heico-trade-customer
    name: Trade Customer Access
    type: enterprise
    description: System integrations with HEICO's component search, ordering, and customer portals are
      restricted to authenticated trade customers under bilateral commercial agreements. No public per-tier
      API pricing is published.
    entries:
      - label: Trade Customer Access
        description: Access negotiated under bilateral trade-customer agreement; no public pricing
        name: trade_customer_access
        type: quota
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://www.heico.com
        unit: 1
        price: 'contact provider'
        userMultiplied: false
    elements:
      - name: Customer Login Required
      - name: Trade Account Required
      - name: HEICO Corporation API
